<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DA50 PLOG · G-DOGA</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

:root {
  --bg:      #0d0f12;
  --surface: #141720;
  --border:  #252a35;
  --accent:  #4fc3f7;
  --accent2: #f59e0b;
  --danger:  #ef4444;
  --ok:      #22c55e;
  --text:    #e2e8f0;
  --muted:   #64748b;
  --mono:    'IBM Plex Mono', monospace;
  --sans:    'IBM Plex Sans', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  min-height: 100vh;
}

/* ── SCREEN CHROME ── */
.app-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.app-header h1 {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent);
}
.app-header .sub {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.08em;
}

.settings-panel {
  display: none;
  padding: 16px 24px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  gap: 12px;
  flex-wrap: wrap;
  align-items: flex-end;
}
.settings-panel.open { display: flex; }

.fuel-row {
  display: flex;
  gap: 12px;
  align-items: flex-end;
  padding: 10px 24px;
  border-bottom: 1px solid var(--border);
  background: rgba(245,158,11,0.04);
}
.fuel-row .note {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  align-self: flex-end;
  padding-bottom: 2px;
}

.controls {
  padding: 16px 24px;
  display: flex;
  gap: 12px;
  align-items: flex-end;
  flex-wrap: wrap;
  border-bottom: 1px solid var(--border);
}

.field { display: flex; flex-direction: column; gap: 5px; }
.field label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
}
.field label.amber { color: var(--accent2); }
.field input {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  padding: 8px 12px;
  border-radius: 4px;
  outline: none;
  transition: border-color 0.15s;
}
.field input:focus { border-color: var(--accent); }
.field input.wide { width: 500px; }
.field input.med  { width: 120px; }
.field input.sm   { width: 80px; }

.btn {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 9px 20px;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  transition: opacity 0.15s;
  white-space: nowrap;
}
.btn:hover    { opacity: 0.85; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-primary  { background: var(--accent);  color: #000; }
.btn-print    { background: var(--accent2); color: #000; }
.btn-settings { background: var(--surface); color: var(--muted); border: 1px solid var(--border); }

.status {
  font-family: var(--mono);
  font-size: 12px;
  padding: 8px 12px;
  border-radius: 4px;
  display: none;
}
.status.visible { display: block; }
.status.loading { color: var(--accent); background: rgba(79,195,247,0.08); border: 1px solid rgba(79,195,247,0.2); }
.status.error   { color: var(--danger); background: rgba(239,68,68,0.08);  border: 1px solid rgba(239,68,68,0.2); }
.status.ok      { color: var(--ok);     background: rgba(34,197,94,0.08);  border: 1px solid rgba(34,197,94,0.2); }

#plog-area { padding: 24px; }
#plog-area:empty::after {
  content: 'Enter a flight plan above and press Generate PLOG';
  display: block;
  text-align: center;
  color: var(--muted);
  font-family: var(--mono);
  font-size: 12px;
  padding: 60px 0;
}

/* ══════════════════════════════════════
   PLOG DOCUMENT
   A4 landscape = 297mm wide.
   Print margins 8mm each side = 281mm usable.
   Nav data cols: ~75% = ~211mm
   Notes col:     ~25% = ~70mm
══════════════════════════════════════ */
.plog-doc {
  background: #fff;
  color: #000;
  font-family: 'IBM Plex Mono', monospace;
  max-width: 297mm;
  margin: 0 auto;
  padding: 6mm 8mm;
  border-radius: 4px;
  box-shadow: 0 4px 40px rgba(0,0,0,0.5);
}

/* Header */
.plog-header {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  border: 1.5px solid #000;
}
.plog-hcell {
  padding: 3px 6px;
  border-right: 1px solid #000;
}
.plog-hcell:last-child { border-right: none; }
.plog-hcell .lbl {
  font-size: 5.5pt;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #777;
  display: block;
  line-height: 1.3;
}
.plog-hcell .val {
  font-size: 9pt;
  font-weight: 600;
  display: block;
  line-height: 1.5;
}

/* Times bar */
.plog-times {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  border: 1.5px solid #000;
  border-top: 1px solid #000;
  margin-bottom: 5px;
}
.plog-tcell {
  padding: 3px 6px;
  border-right: 1px solid #000;
  min-height: 24px;
}
.plog-tcell:last-child { border-right: none; }
.plog-tcell .lbl {
  font-size: 5.5pt;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: #999;
  display: block;
  margin-bottom: 3px;
}
.plog-tcell .line {
  display: block;
  height: 12px;
  border-bottom: 1px solid #ccc;
  width: 88%;
}

/* ── MAIN TABLE ──
   table-layout: fixed with explicit % widths.
   13 nav cols share 75%, notes col gets 25%.
   Nav col percentages are of the full 100% table width,
   so they collectively add to 75%.

   Col breakdown (% of total table width):
     WPT   6%
     FREQ  5%
     FL    3.5%
     TRK   4%    (stacked trk/hdg)
     WIND  4.5%
     SPD   3.5%  (stacked tas/gs)
     NM    3.5%
     ETE   3.5%
     ATA   4%
     MSA   3.5%
     PLAN  4%
     ACT   3%
     +/-   3%
     ──────────
     nav   55.5%  ... hmm let's just use auto and let the named % drive it
*/
.plog-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 8pt;
  font-family: 'IBM Plex Mono', monospace;
  table-layout: fixed;
}

/* Nav data columns — each sized generously so text is readable */
.plog-table col.c-wpt   { width: 7%;   }
.plog-table col.c-freq  { width: 6%;   }
.plog-table col.c-fl    { width: 4%;   }
.plog-table col.c-trk   { width: 5%;   }
.plog-table col.c-wind  { width: 6%;   }
.plog-table col.c-spd   { width: 4%;   }
.plog-table col.c-dist  { width: 4.5%; }
.plog-table col.c-ete   { width: 5%;   }
.plog-table col.c-ata   { width: 5%;   }
.plog-table col.c-msa   { width: 4.5%; }
.plog-table col.c-fp    { width: 5%;   }
.plog-table col.c-fa    { width: 4%;   }
.plog-table col.c-fd    { width: 4%;   }
/* Notes: everything that's left (~25%) */
.plog-table col.c-notes { width: 26%;  }

/* Thead */
.plog-table thead tr {
  background: #1a1a2e;
  color: #fff;
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}
.plog-table thead th {
  padding: 3px 4px;
  text-align: center;
  font-size: 6.5pt;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  border: 1px solid #000;
  line-height: 1.3;
  overflow: hidden;
}
.plog-table thead th.left { text-align: left; }

/* Group sub-header */
.plog-table thead tr.grp {
  background: #2d3561;
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}
.plog-table thead tr.grp th {
  font-size: 5.5pt;
  padding: 1px 4px;
  letter-spacing: 0.07em;
}

/* Body rows */
.plog-table tbody tr { border-bottom: 1px solid #e0e0e0; }
.plog-table tbody tr:nth-child(even) { background: #f8f9fb; }
.plog-table tbody tr.dest-row {
  background: #dbeafe;
  font-weight: 600;
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}

.plog-table tbody td {
  padding: 3px 4px;
  border: 1px solid #ddd;
  text-align: center;
  vertical-align: middle;
  white-space: nowrap;
  overflow: hidden;
  font-size: 8pt;
}
.plog-table tbody td.wpt {
  font-weight: 700;
  font-size: 8.5pt;
  text-align: left;
}
.plog-table tbody td.freq {
  font-size: 7pt;
  color: #444;
}

/* Stacked cells */
td.stacked, th.stacked-h { padding: 1px 4px !important; }
.stacked .top, .stacked-h .top {
  display: block;
  border-bottom: 1px solid #ddd;
  padding-bottom: 1px;
  margin-bottom: 1px;
  line-height: 1.35;
}
.stacked-h .top { border-color: rgba(255,255,255,0.2); }
.stacked .bot, .stacked-h .bot { display: block; line-height: 1.35; }
.stacked .bot   { color: #444; }
.stacked-h .bot { opacity: 0.75; }

/* Fuel planned */
.plog-table tbody td.fuel-p {
  background: #fffbeb;
  font-weight: 700;
  color: #78350f;
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}
/* Fuel actual — blank */
.plog-table tbody td.fuel-a {
  background: #f0fdf4;
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}
/* Fuel diff — blank */
.plog-table tbody td.fuel-d {
  background: #fff7ed;
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}

/* MSA */
.plog-table tbody td.msa-val { color: #b91c1c; font-weight: 600; }

/* ATA */
.plog-table tbody td.ata-cell { background: #f5f5f5; }
.ata-input {
  width: 32px;
  border: none;
  border-bottom: 1px solid #999;
  background: transparent;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 8pt;
  text-align: center;
  outline: none;
  padding: 0;
}

/* Notes cell — wide blank row cell, left-border separator, faint underline */
.plog-table tbody td.notes-cell {
  background: #fff;
  border-left: 2px solid #888;
  text-align: left;
  white-space: normal;
  /* faint ruled line so pilot can write on it */
  background-image: linear-gradient(
    to bottom,
    transparent calc(100% - 1px),
    #e0e0e0 calc(100% - 1px)
  );
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}
.plog-table thead th.notes-hdr {
  border-left: 2px solid #888;
  text-align: left;
  padding-left: 5px;
}

/* Footer */
.plog-footer {
  margin-top: 5px;
  display: grid;
  grid-template-columns: 2fr 1fr;
  border: 1px solid #bbb;
}
.plog-footer-cell {
  padding: 3px 6px;
  border-right: 1px solid #bbb;
  min-height: 20px;
}
.plog-footer-cell:last-child { border-right: none; }
.plog-footer-cell .lbl {
  font-size: 5.5pt;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #aaa;
  display: block;
}

/* ══════════════════════════════════════
   PRINT — A4 landscape
══════════════════════════════════════ */

/* thead repeats on every printed page */
.plog-table thead { display: table-header-group; }
.plog-table tbody { display: table-row-group; }

/* Keep individual rows intact; allow tbody to span pages */
.plog-table tbody tr {
  page-break-inside: avoid;
  break-inside:      avoid;
}

/* Don't break the header/times block */
.plog-header, .plog-times {
  page-break-inside: avoid;
  break-inside:      avoid;
}

/* Footer stays together */
.plog-footer {
  page-break-inside: avoid;
  break-inside:      avoid;
}

@media print {
  @page { size: A4 landscape; margin: 6mm 8mm; }
  body  { background: #fff !important; }
  .app-header, .controls, .settings-panel,
  .fuel-row, .status, .no-print { display: none !important; }
  #plog-area { padding: 0 !important; }
  .plog-doc  {
    box-shadow:    none !important;
    border-radius: 0 !important;
    padding:       0 !important;
    max-width:     100% !important;
    overflow:      visible !important;
    height:        auto !important;
    max-height:    none !important;
  }
  .plog-table {
    overflow:          visible !important;
    page-break-inside: auto;
    break-inside:      auto;
  }
}
</style>
</head>
<body>

<div class="app-header">
  <h1>DA50 Navigation Log</h1>
  <span class="sub">G-DOGA &nbsp;·&nbsp; Diamond DA 50 RG &nbsp;·&nbsp; CD-300 &nbsp;·&nbsp; IFR</span>
</div>

<!-- Settings -->
<div class="settings-panel" id="settings-panel">
  <div class="field">
    <label>GAS Endpoint URL</label>
    <input type="text" id="gas-url" class="wide"
      value="https://script.google.com/macros/s/AKfycbyIPDzeYVGOEWrRF3c2qUJZI1MKr-9uGIm8ilQlFlknjq8oseqS2zoYong8yiathYnZGw/exec">
  </div>
  <div class="field">
    <label>Callsign</label>
    <input type="text" id="callsign" class="med" value="GDOGA">
  </div>
  <div class="field">
    <label>Terrain Corridor (nm)</label>
    <input type="number" id="terrain-corridor" class="sm" value="5" min="0" max="25">
  </div>
  <button class="btn btn-primary" onclick="saveSettings()">Save</button>
  <button class="btn btn-settings" onclick="testConnection()">Test Connection</button>
</div>

<!-- Fuel -->
<div class="fuel-row">
  <div class="field">
    <label class="amber">Block Fuel (USG)</label>
    <input type="number" id="fuel-block" class="sm" value="49.0" min="0" max="49" step="0.5">
  </div>
  <span class="note">Max usable 49.0 USG &nbsp;·&nbsp; LH 25.0 + RH 24.0</span>
</div>

<!-- Controls -->
<div class="controls">
  <div class="field">
    <label>Route — Item 15 or full FPL string</label>
    <input type="text" id="fpl-input" class="wide"
      placeholder="N0161F100 IXURA DCT DTY Y53 SAPCO N57 POL N601 ERGAB DCT UTOGU N601 GRICE DCT LAGAV DCT GUSSI N560 DAVOT">
  </div>
  <div class="field">
    <label>Dep</label>
    <input type="text" id="dep" class="sm" value="EGTK" maxlength="4" style="text-transform:uppercase">
  </div>
  <div class="field">
    <label>Dest</label>
    <input type="text" id="dest" class="sm" value="EGPE" maxlength="4" style="text-transform:uppercase">
  </div>
  <div class="field">
    <label>EOBT (UTC)</label>
    <input type="text" id="eobt" class="med" value="1545" maxlength="4">
  </div>
  <button class="btn btn-primary" id="gen-btn" onclick="generate()">Generate PLOG</button>
  <button class="btn btn-print no-print" onclick="window.print()">Print / PDF</button>
  <button class="btn btn-settings no-print" onclick="toggleSettings()">⚙ Settings</button>
  <div class="status" id="status"></div>
</div>

<div id="plog-area"></div>

<script>
const KEY_URL  = 'da50_gas_url';
const KEY_CS   = 'da50_callsign';
const KEY_FUEL = 'da50_fuel_block';

function loadSettings() {
  const url  = localStorage.getItem(KEY_URL);
  const cs   = localStorage.getItem(KEY_CS);
  const fuel = localStorage.getItem(KEY_FUEL);
  if (url)  document.getElementById('gas-url').value    = url;
  if (cs)   document.getElementById('callsign').value   = cs;
  if (fuel) document.getElementById('fuel-block').value = fuel;
}

function saveSettings() {
  localStorage.setItem(KEY_URL, document.getElementById('gas-url').value.trim());
  localStorage.setItem(KEY_CS,  document.getElementById('callsign').value.trim());
  setStatus('Settings saved', 'ok');
}

function toggleSettings() {
  document.getElementById('settings-panel').classList.toggle('open');
}

document.getElementById('fuel-block').addEventListener('input', () =>
  localStorage.setItem(KEY_FUEL, document.getElementById('fuel-block').value)
);

function setStatus(msg, type) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = `status visible ${type}`;
  if (type === 'ok') setTimeout(() => { el.className = 'status'; }, 3000);
}

async function testConnection() {
  const url = document.getElementById('gas-url').value.trim();
  if (!url) { setStatus('No GAS URL configured', 'error'); return; }
  setStatus('Testing...', 'loading');
  try {
    const resp = await fetch(url, {
      method: 'POST',
      body: new URLSearchParams({ action: 'ping' })
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    if (data.ok) {
      setStatus('Connected — AutoRouter credentials will be checked on first route request', 'ok');
    } else {
      setStatus('GAS reachable but returned: ' + JSON.stringify(data), 'error');
    }
  } catch(e) { setStatus('Connection failed: ' + e.message, 'error'); }
}

async function generate() {
  const gasUrl    = document.getElementById('gas-url').value.trim();
  const fpl       = document.getElementById('fpl-input').value.trim();
  const dep       = document.getElementById('dep').value.trim().toUpperCase();
  const dest      = document.getElementById('dest').value.trim().toUpperCase();
  const eobt      = document.getElementById('eobt').value.trim();
  const blockFuel = parseFloat(document.getElementById('fuel-block').value) || 49;
  const corridor  = parseInt(document.getElementById('terrain-corridor').value) || 5;
  const callsign  = document.getElementById('callsign').value.trim() || 'GDOGA';

  if (!gasUrl) { setStatus('Configure GAS URL in Settings', 'error'); return; }
  if (!fpl)    { setStatus('Enter a route string', 'error'); return; }
  if (!dep || !dest) { setStatus('Enter departure and destination', 'error'); return; }

  let fullFpl = fpl;
  if (!fpl.startsWith('(FPL')) {
    fullFpl = `(FPL-${callsign}-IG -DA50/L -SYBLDGOR/S -${dep}${eobt} -${fpl} -${dest}0000 -)`;
  }

  document.getElementById('gen-btn').disabled = true;
  setStatus('Fetching route from AutoRouter...', 'loading');

  try {
    // GAS strips query params on redirect — use POST with form body instead.
    // GAS e.parameter reads both GET query strings and POST form fields,
    // and POST bodies survive the GAS redirect correctly.
    const body = new URLSearchParams({
      action: 'getRoute',
      fpl: fullFpl,
      terraincorridor: corridor
    });

    const resp = await fetch(gasUrl, {
      method: 'POST',
      body: body
      // no Content-Type header — let browser set application/x-www-form-urlencoded
    });

    if (!resp.ok) {
      throw new Error('GAS returned HTTP ' + resp.status);
    }

    const data = await resp.json();

    if (data.error) {
      setStatus('AutoRouter error: ' + data.error, 'error');
      return;
    }

    // Live data — pass block fuel from UI (AR may return its own blockFuel
    // but we use what the pilot has entered as it reflects actual uplift)
    renderPlog(data, blockFuel);
    setStatus('PLOG generated', 'ok');

  } catch(e) {
    setStatus('Error: ' + e.message, 'error');
  } finally {
    document.getElementById('gen-btn').disabled = false;
  }
}

function buildDemoData(dep, dest, eobt, fpl, callsign) {
  const legs = [
    { ident:'EGTK',  fl:'',     mt:null,mh:null,wd:247,ws:27, tas:null,gs:null, dist:9.7,  ete:'00:07', burn:0,    msa:null, freq:'' },
    { ident:'IXURA', fl:'F100', mt:343, mh:344, wd:290,ws:53, tas:161, gs:121,  dist:4.8,  ete:'00:03', burn:2.4,  msa:null, freq:'' },
    { ident:'DTY',   fl:'F100', mt:59,  mh:60,  wd:290,ws:53, tas:161, gs:189,  dist:13.4, ete:'00:04', burn:3.3,  msa:null, freq:'116.400' },
    { ident:'SAPCO', fl:'F100', mt:337, mh:338, wd:287,ws:55, tas:161, gs:121,  dist:23.4, ete:'00:12', burn:4.8,  msa:null, freq:'' },
    { ident:'TNT',   fl:'F100', mt:339, mh:340, wd:287,ws:61, tas:161, gs:122,  dist:32.9, ete:'00:16', burn:7.2,  msa:null, freq:'115.700' },
    { ident:'POL',   fl:'F100', mt:339, mh:340, wd:284,ws:72, tas:163, gs:116,  dist:7.2,  ete:'00:04', burn:10.8, msa:2900, freq:'112.100' },
    { ident:'ERGAB', fl:'F100', mt:338, mh:338, wd:283,ws:75, tas:163, gs:109,  dist:63.2, ete:'00:34', burn:14.5, msa:3300, freq:'' },
    { ident:'UTOGU', fl:'F100', mt:338, mh:337, wd:279,ws:66, tas:166, gs:121,  dist:1.4,  ete:'00:00', burn:25.1, msa:3800, freq:'' },
    { ident:'TLA',   fl:'F100', mt:346, mh:345, wd:278,ws:60, tas:166, gs:134,  dist:43.4, ete:'00:20', burn:25.6, msa:3600, freq:'113.800' },
    { ident:'GRICE', fl:'F100', mt:339, mh:338, wd:277,ws:58, tas:165, gs:129,  dist:43.2, ete:'00:20', burn:31.6, msa:3600, freq:'' },
    { ident:'LAGAV', fl:'F100', mt:9,   mh:8,   wd:276,ws:57, tas:135, gs:124,  dist:19.4, ete:'00:09', burn:37.4, msa:4600, freq:'' },
    { ident:'GUSSI', fl:'F100', mt:9,   mh:8,   wd:275,ws:58, tas:160, gs:151,  dist:1.3,  ete:'00:01', burn:39.0, msa:4000, freq:'' },
    { ident:'DAVOT', fl:'3739', mt:8,   mh:7,   wd:277,ws:57, tas:126, gs:120,  dist:12.0, ete:'00:06', burn:39.2, msa:3700, freq:'' },
    { ident:'EGPE',  fl:'',     mt:349, mh:348, wd:273,ws:24, tas:null,gs:null, dist:0,    ete:'',      burn:41.5, msa:null, freq:'', isLast:true },
  ];
  return { departure:dep, destination:dest, eobt, callsign, fplan:fpl,
           acftType:'DA50', totalEet:'03:05', tripFuel:41.5, legs };
}

function renderPlog(data, blockFuel) {
  const date = new Date().toISOString().slice(0,10);

  const header = `
  <div class="plog-header">
    <div class="plog-hcell"><span class="lbl">Departure</span><span class="val">${data.departure}</span></div>
    <div class="plog-hcell"><span class="lbl">Destination</span><span class="val">${data.destination}</span></div>
    <div class="plog-hcell"><span class="lbl">Date</span><span class="val">${date}</span></div>
    <div class="plog-hcell"><span class="lbl">Callsign</span><span class="val">${data.callsign}</span></div>
    <div class="plog-hcell"><span class="lbl">Aircraft</span><span class="val">${data.acftType} · G-DOGA</span></div>
    <div class="plog-hcell"><span class="lbl">Block Fuel (USG)</span><span class="val">${blockFuel.toFixed(1)}</span></div>
  </div>`;

  const times = `
  <div class="plog-times">
    <div class="plog-tcell"><span class="lbl">Off Blocks (UTC)</span><span class="line"></span></div>
    <div class="plog-tcell"><span class="lbl">Takeoff (UTC)</span><span class="line"></span></div>
    <div class="plog-tcell"><span class="lbl">Landing (UTC)</span><span class="line"></span></div>
    <div class="plog-tcell"><span class="lbl">On Blocks (UTC)</span><span class="line"></span></div>
    <div class="plog-tcell"><span class="lbl">Block Time</span><span class="line"></span></div>
  </div>`;

  let rows = '';
  data.legs.forEach((leg, i) => {
    const isLast  = leg.isLast || i === data.legs.length - 1;
    const fuelRem = Math.max(0, blockFuel - (parseFloat(leg.burn) || 0)).toFixed(1);

    const wind = (leg.wd != null && leg.ws != null)
      ? `${String(leg.wd).padStart(3,'0')}/${String(leg.ws).padStart(2,'0')}` : '';

    const trkHdg = (leg.mt != null && leg.mh != null)
      ? `<span class="top">${String(leg.mt).padStart(3,'0')}°</span><span class="bot">${String(leg.mh).padStart(3,'0')}°</span>` : '';

    const tasGs = (leg.tas != null && leg.gs != null)
      ? `<span class="top">${leg.tas}</span><span class="bot">${leg.gs}</span>` : '';

    const msaDisp = leg.msa ? Math.round(leg.msa / 100) * 100 : '';

    rows += `
    <tr class="${isLast ? 'dest-row' : ''}">
      <td class="wpt">${leg.ident}</td>
      <td class="freq">${leg.freq || ''}</td>
      <td>${leg.fl || ''}</td>
      <td class="stacked">${trkHdg}</td>
      <td>${wind}</td>
      <td class="stacked">${tasGs}</td>
      <td>${leg.dist > 0 ? leg.dist.toFixed(1) : ''}</td>
      <td>${leg.ete || ''}</td>
      <td class="ata-cell"><input class="ata-input" type="text" maxlength="4" placeholder="____"></td>
      <td class="${leg.msa ? 'msa-val' : ''}">${msaDisp}</td>
      <td class="fuel-p">${fuelRem}</td>
      <td class="fuel-a">&nbsp;</td>
      <td class="fuel-d">&nbsp;</td>
      <td class="notes-cell">&nbsp;</td>
    </tr>`;
  });

  const table = `
  <table class="plog-table">
    <colgroup>
      <col class="c-wpt">
      <col class="c-freq">
      <col class="c-fl">
      <col class="c-trk">
      <col class="c-wind">
      <col class="c-spd">
      <col class="c-dist">
      <col class="c-ete">
      <col class="c-ata">
      <col class="c-msa">
      <col class="c-fp">
      <col class="c-fa">
      <col class="c-fd">
      <col class="c-notes">
    </colgroup>
    <thead>
      <tr class="grp">
        <th colspan="2" class="left">Waypoint</th>
        <th>Alt</th>
        <th>Nav</th>
        <th>Met</th>
        <th>Spd</th>
        <th colspan="2">Leg</th>
        <th>&nbsp;</th>
        <th>Clear</th>
        <th colspan="3">Fuel (USG)</th>
        <th class="notes-hdr left">ATC / Clearance Notes</th>
      </tr>
      <tr>
        <th class="left">WPT</th>
        <th>FREQ</th>
        <th>FL</th>
        <th class="stacked-h"><span class="top">TRK°M</span><span class="bot">HDG°M</span></th>
        <th>WIND<br><span style="font-size:5pt;opacity:.7">D/V</span></th>
        <th class="stacked-h"><span class="top">TAS</span><span class="bot">GS</span></th>
        <th>NM</th>
        <th>ETE</th>
        <th>ATA<br><span style="font-size:5pt;opacity:.7">UTC</span></th>
        <th>MSA<br><span style="font-size:5pt;opacity:.7">ft</span></th>
        <th>PLAN</th>
        <th>ACT</th>
        <th>+/−</th>
        <th class="notes-hdr left" style="font-size:5.5pt;letter-spacing:0.06em;font-weight:400;opacity:.8;">
          Freq &nbsp;·&nbsp; Level &nbsp;·&nbsp; ATC Instructions
        </th>
      </tr>
    </thead>
    <tbody>${rows}</tbody>
  </table>`;

  const footer = `
  <div class="plog-footer">
    <div class="plog-footer-cell">
      <span class="lbl">Route</span>
      <span style="font-size:5.5pt;word-break:break-all;line-height:1.4;">${data.fplan || ''}</span>
    </div>
    <div class="plog-footer-cell"><span class="lbl">PIC Signature</span></div>
  </div>`;

  document.getElementById('plog-area').innerHTML =
    `<div class="plog-doc">${header}${times}${table}${footer}</div>`;
}

loadSettings();
</script>
</body>
</html>
