<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TN Invoices">
<title>TN Invoices</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f2f2f7;
  --surface: #ffffff;
  --surface2: #f2f2f7;
  --surface3: #e5e5ea;
  --border: rgba(60,60,67,0.12);
  --border2: rgba(60,60,67,0.2);
  --text: #000000;
  --text2: #3c3c43;
  --text3: rgba(60,60,67,0.6);
  --accent: #007aff;
  --accent2: #0056b3;
  --green: #34c759;
  --green2: #248a3d;
  --red: #ff3b30;
  --red2: #c0392b;
  --amber: #ff9500;
  --purple: #af52de;
  --mono: 'Space Mono', monospace;
  --sans: 'DM Sans', sans-serif;
  --safe-top: env(safe-area-inset-top, 44px);
  --safe-bot: env(safe-area-inset-bottom, 34px);
  --safe-left: env(safe-area-inset-left, 0px);
  --safe-right: env(safe-area-inset-right, 0px);
  --bar-h: 83px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 16px; overflow: hidden; }

/* ── SCREENS ── */
.screen { display: none; position: fixed; inset: 0; }
.screen.active { display: flex; flex-direction: column; }

/* ── LOGIN ── */
#screen-login {
  background: #1c1c1e;
  align-items: center; justify-content: center;
  padding: 40px 32px;
  padding-top: calc(var(--safe-top) + 40px);
  padding-bottom: calc(var(--safe-bot) + 40px);
}
.login-logo {
  font-family: var(--mono); font-size: 11px; color: rgba(255,255,255,0.4);
  letter-spacing: 4px; text-transform: uppercase; margin-bottom: 12px; text-align: center;
}
.login-title { font-size: 28px; font-weight: 700; color: #fff; text-align: center; margin-bottom: 6px; }
.login-sub { font-size: 15px; color: rgba(255,255,255,0.5); text-align: center; margin-bottom: 48px; }
.login-input {
  width: 100%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 14px; padding: 16px 20px; color: #fff; font-family: var(--mono);
  font-size: 24px; letter-spacing: 8px; text-align: center; outline: none;
  transition: border-color 0.2s; margin-bottom: 16px;
}
.login-input:focus { border-color: var(--accent); }
.login-input::placeholder { color: rgba(255,255,255,0.25); letter-spacing: 4px; font-size: 16px; }
.login-btn {
  width: 100%; background: var(--accent); border: none; border-radius: 14px;
  padding: 16px; color: #fff; font-family: var(--sans); font-size: 17px; font-weight: 600;
  cursor: pointer; transition: opacity 0.15s; margin-bottom: 16px;
}
.login-btn:active { opacity: 0.8; }
.login-err { color: var(--red); font-size: 14px; text-align: center; min-height: 20px; }
.login-hint { color: rgba(255,255,255,0.25); font-size: 12px; text-align: center; margin-top: 24px; font-family: var(--mono); }

/* ── MAIN APP SCREEN ── */
#screen-app {
  background: var(--bg);
}

/* ── HEADER ── */
.app-header {
  background: rgba(242,242,247,0.92);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 0.5px solid var(--border);
  padding-top: var(--safe-top);
  flex-shrink: 0;
  z-index: 10;
}
.header-inner {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 20px 12px;
}
.header-title { font-size: 17px; font-weight: 600; }
.header-action {
  background: none; border: none; color: var(--accent); font-family: var(--sans);
  font-size: 17px; font-weight: 500; cursor: pointer; padding: 4px 0;
}
.header-action:active { opacity: 0.6; }
.sync-dot {
  width: 8px; height: 8px; border-radius: 50%; background: var(--text3);
  display: inline-block; margin-right: 6px; transition: background 0.3s;
}
.sync-dot.green { background: var(--green); }
.sync-dot.amber { background: var(--amber); }
.sync-dot.red { background: var(--red); }

/* ── SCROLLABLE CONTENT ── */
.app-content {
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding-bottom: calc(var(--bar-h) + 8px);
}

/* ── BOTTOM TAB BAR ── */
.tab-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
  background: rgba(242,242,247,0.92);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-top: 0.5px solid var(--border);
  display: flex;
  padding-bottom: var(--safe-bot);
}
.tab-item {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  padding: 10px 0 2px; cursor: pointer; border: none; background: none;
  color: var(--text3); transition: color 0.15s; gap: 4px; font-family: var(--sans);
}
.tab-item.active { color: var(--accent); }
.tab-item:active { opacity: 0.7; }
.tab-icon { font-size: 24px; line-height: 1; }
.tab-label { font-size: 10px; font-weight: 500; letter-spacing: 0.2px; }
.tab-badge {
  position: relative;
}
.tab-badge::after {
  content: attr(data-count);
  position: absolute; top: -4px; right: -10px;
  background: var(--red); color: #fff;
  font-size: 10px; font-weight: 700;
  font-family: var(--mono);
  min-width: 18px; height: 18px;
  border-radius: 9px; padding: 0 4px;
  display: flex; align-items: center; justify-content: center;
  line-height: 18px; text-align: center;
}
.tab-badge[data-count="0"]::after { display: none; }

/* ── VIEWS ── */
.view { display: none; }
.view.active { display: block; }

/* ── iOS GROUPED LISTS ── */
.list-section { margin: 20px 16px 0; }
.list-section-header {
  font-size: 13px; font-weight: 500; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.5px;
  padding: 0 16px 6px; font-family: var(--mono);
}
.list-group {
  background: var(--surface); border-radius: 12px; overflow: hidden;
}
.list-row {
  display: flex; align-items: center; padding: 13px 16px;
  border-bottom: 0.5px solid var(--border); gap: 12px; cursor: pointer;
  transition: background 0.1s; position: relative;
}
.list-row:last-child { border-bottom: none; }
.list-row:active { background: var(--surface3); }
.list-row-icon {
  width: 32px; height: 32px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.list-row-body { flex: 1; min-width: 0; }
.list-row-title { font-size: 17px; font-weight: 500; color: var(--text); }
.list-row-sub { font-size: 13px; color: var(--text3); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.list-row-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.list-row-value { font-family: var(--mono); font-size: 15px; font-weight: 700; }
.list-row-chevron { color: var(--border2); font-size: 18px; font-weight: 300; }

/* ── STATUS PILLS ── */
.status-pill {
  display: inline-block; padding: 3px 10px; border-radius: 20px;
  font-size: 12px; font-weight: 600; font-family: var(--mono);
}
.pill-unpaid { background: #fff0ee; color: var(--red2); }
.pill-paid   { background: #e9f9ee; color: var(--green2); }
.pill-partial{ background: #fff8e0; color: #8a5c00; }
.pill-baddebt{ background: #f2f2f7; color: var(--text3); }

/* ── SUMMARY CARDS ── */
.summary-card {
  background: var(--surface); border-radius: 16px; padding: 20px;
  margin: 16px 16px 0;
}
.summary-card-label {
  font-size: 13px; color: var(--text3); font-family: var(--mono);
  letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px;
}
.summary-card-amount {
  font-size: 36px; font-weight: 700; font-family: var(--mono);
  line-height: 1.1;
}
.summary-card-amount.red { color: var(--red2); }
.summary-card-amount.green { color: var(--green2); }
.summary-card-amount.accent { color: var(--accent); }
.summary-card-sub { font-size: 14px; color: var(--text3); margin-top: 6px; }
.summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 12px 16px 0; }
.summary-mini {
  background: var(--surface); border-radius: 12px; padding: 16px;
}
.summary-mini-label { font-size: 12px; color: var(--text3); font-family: var(--mono); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 4px; }
.summary-mini-value { font-size: 22px; font-weight: 700; font-family: var(--mono); }

/* ── CREATE INVOICE ── */
.form-section { margin: 20px 16px 0; }
.form-section-title {
  font-size: 13px; font-weight: 500; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.5px;
  padding: 0 16px 6px; font-family: var(--mono);
}
.form-group { background: var(--surface); border-radius: 12px; overflow: hidden; }
.form-row {
  display: flex; align-items: center; padding: 13px 16px;
  border-bottom: 0.5px solid var(--border); gap: 12px; min-height: 52px;
}
.form-row:last-child { border-bottom: none; }
.form-label { font-size: 17px; color: var(--text); width: 110px; flex-shrink: 0; }
.form-input {
  flex: 1; background: none; border: none; outline: none; font-family: var(--sans);
  font-size: 17px; color: var(--text2); text-align: right; min-width: 0;
}
.form-input::placeholder { color: var(--text3); }
.form-input-mono {
  flex: 1; background: none; border: none; outline: none; font-family: var(--mono);
  font-size: 17px; color: var(--accent); text-align: right; min-width: 0;
}
.form-select {
  flex: 1; background: none; border: none; outline: none; font-family: var(--sans);
  font-size: 17px; color: var(--text2); text-align: right; -webkit-appearance: none;
  cursor: pointer;
}
.form-select option { color: var(--text); background: var(--surface); }

/* ── TYPE TOGGLE ── */
.type-toggle {
  display: flex; background: var(--surface3); border-radius: 10px; padding: 3px;
  margin: 16px 16px 0;
}
.type-btn {
  flex: 1; padding: 9px; border: none; border-radius: 8px; font-family: var(--sans);
  font-size: 15px; font-weight: 500; cursor: pointer; transition: all 0.2s;
  background: none; color: var(--text3);
}
.type-btn.active { background: var(--surface); color: var(--accent); box-shadow: 0 1px 4px rgba(0,0,0,0.12); }

/* ── CALENDAR ── */
.calendar-wrap { margin: 12px 16px 0; background: var(--surface); border-radius: 12px; overflow: hidden; padding: 16px; }
.cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.cal-month { font-size: 17px; font-weight: 600; }
.cal-nav { background: var(--surface3); border: none; border-radius: 8px; padding: 6px 14px; font-size: 20px; cursor: pointer; color: var(--accent); }
.cal-nav:active { opacity: 0.6; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.cal-day-name {
  text-align: center; font-size: 11px; font-weight: 600; color: var(--text3);
  padding-bottom: 8px; font-family: var(--mono);
}
.cal-cell {
  aspect-ratio: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; border-radius: 10px; cursor: pointer; position: relative;
  border: none; background: none; font-family: var(--sans); transition: all 0.15s;
}
.cal-cell:active { opacity: 0.7; }
.cal-cell.empty { cursor: default; }
.cal-cell.weekend { opacity: 0.35; }
.cal-cell.excluded { background: var(--surface2) !important; }
.cal-cell.excluded .cal-num { color: var(--text3); text-decoration: line-through; }
.cal-cell.has-value { background: #e9f9ee; }
.cal-cell.has-value .cal-num { color: var(--green2); font-weight: 700; }
.cal-cell.today { outline: 2px solid var(--accent); outline-offset: -2px; }
.cal-num { font-size: 16px; font-weight: 500; line-height: 1; }
.cal-dot { width: 4px; height: 4px; border-radius: 2px; margin-top: 2px; background: var(--accent); }
.cal-rate { font-size: 9px; color: var(--green2); font-family: var(--mono); font-weight: 700; }

.cal-total-bar {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 14px; padding-top: 14px; border-top: 0.5px solid var(--border);
}
.cal-total-label { font-size: 14px; color: var(--text3); font-family: var(--mono); }
.cal-total-value { font-size: 24px; font-weight: 700; font-family: var(--mono); color: var(--green2); }

/* ── QUICK ACTIONS ROW ── */
.quick-actions {
  display: flex; gap: 8px; margin: 10px 16px 0; flex-wrap: wrap;
}
.qa-btn {
  padding: 8px 14px; border-radius: 20px; font-size: 14px; font-weight: 500;
  border: 1.5px solid var(--border2); background: var(--surface); color: var(--text2);
  cursor: pointer; font-family: var(--sans); white-space: nowrap;
}
.qa-btn:active { background: var(--surface3); }
.qa-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ── ADD-ONS ── */
.addons-wrap { margin: 10px 16px 0; }
.addons-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.addon-pill {
  display: flex; align-items: center; gap: 8px; padding: 10px 14px;
  border-radius: 12px; background: var(--surface); border: 1.5px solid var(--border2);
  cursor: pointer; font-family: var(--sans); font-size: 14px; transition: all 0.15s;
}
.addon-pill.active { border-color: var(--accent); background: #e8f2ff; }
.addon-pill:active { opacity: 0.75; }
.addon-pill-label { font-weight: 500; color: var(--text2); }
.addon-pill.active .addon-pill-label { color: var(--accent); }
.addon-pill-amount { font-family: var(--mono); font-size: 13px; color: var(--text3); }
.addon-pill.active .addon-pill-amount { color: var(--accent); font-weight: 700; }

/* ── DAY DETAIL SHEET ── */
.sheet-overlay {
  display: none; position: fixed; inset: 0; z-index: 50;
  background: rgba(0,0,0,0.5);
}
.sheet-overlay.open { display: block; }
.day-sheet {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 51;
  background: var(--surface); border-radius: 20px 20px 0 0;
  padding: 0 0 calc(var(--safe-bot) + 16px);
  transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
  max-height: 70vh; overflow-y: auto;
}
.day-sheet.open { transform: translateY(0); }
.sheet-handle { width: 36px; height: 5px; border-radius: 3px; background: var(--surface3); margin: 10px auto 16px; }
.sheet-title { font-size: 17px; font-weight: 700; text-align: center; margin-bottom: 20px; padding: 0 20px; }
.sheet-amount-row { display: flex; align-items: center; gap: 10px; padding: 0 20px; margin-bottom: 14px; }
.sheet-amount-label { font-size: 17px; color: var(--text2); }
.sheet-amount-input {
  flex: 1; background: var(--surface2); border: 1.5px solid var(--border2);
  border-radius: 12px; padding: 12px 16px; font-family: var(--mono);
  font-size: 20px; font-weight: 700; color: var(--green2); outline: none;
  text-align: right;
}
.sheet-amount-input:focus { border-color: var(--accent); }
.sheet-quick { display: flex; gap: 8px; padding: 0 20px; margin-bottom: 14px; }
.sheet-q-btn {
  flex: 1; padding: 10px; border-radius: 10px; border: 1.5px solid var(--border2);
  background: var(--surface2); font-family: var(--mono); font-size: 14px; font-weight: 700;
  cursor: pointer; color: var(--text2);
}
.sheet-q-btn:active { background: var(--surface3); }
.sheet-note-row { padding: 0 20px; margin-bottom: 20px; }
.sheet-note-input {
  width: 100%; background: var(--surface2); border: 1.5px solid var(--border2);
  border-radius: 12px; padding: 12px 16px; font-family: var(--sans); font-size: 16px;
  color: var(--text2); outline: none; resize: none;
}
.sheet-note-input:focus { border-color: var(--accent); }
.sheet-done-btn {
  margin: 0 20px; width: calc(100% - 40px); padding: 16px; background: var(--accent);
  border: none; border-radius: 14px; color: #fff; font-family: var(--sans);
  font-size: 17px; font-weight: 600; cursor: pointer;
}
.sheet-done-btn:active { opacity: 0.85; }

/* ── INVOICE DETAIL SHEET ── */
.inv-sheet {
  position: fixed; inset: 0; z-index: 50;
  background: var(--bg);
  transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
  display: flex; flex-direction: column;
}
.inv-sheet.open { transform: translateX(0); }
.inv-sheet-header {
  background: rgba(242,242,247,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 0.5px solid var(--border);
  padding-top: var(--safe-top);
  flex-shrink: 0;
}
.inv-sheet-header-inner {
  display: flex; align-items: center; padding: 10px 16px 12px; gap: 12px;
}
.back-btn {
  background: none; border: none; color: var(--accent); font-family: var(--sans);
  font-size: 17px; font-weight: 400; cursor: pointer; display: flex; align-items: center; gap: 4px;
  padding: 4px 0;
}
.back-btn:active { opacity: 0.6; }
.inv-sheet-title { font-size: 17px; font-weight: 600; flex: 1; text-align: center; }
.inv-sheet-action {
  background: none; border: none; color: var(--accent); font-family: var(--sans);
  font-size: 15px; font-weight: 500; cursor: pointer; padding: 4px 0;
}
.inv-sheet-action:active { opacity: 0.6; }
.inv-sheet-content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 32px; }

/* ── INV DETAIL HERO ── */
.inv-hero {
  background: var(--surface); margin: 20px 16px 0; border-radius: 16px; padding: 20px;
  text-align: center;
}
.inv-hero-client { font-size: 15px; color: var(--text3); margin-bottom: 4px; }
.inv-hero-num { font-family: var(--mono); font-size: 13px; color: var(--text3); margin-bottom: 12px; }
.inv-hero-amount { font-family: var(--mono); font-size: 42px; font-weight: 700; line-height: 1; }
.inv-hero-amount.unpaid { color: var(--red2); }
.inv-hero-amount.paid   { color: var(--green2); }
.inv-hero-amount.partial{ color: var(--amber); }
.inv-hero-amount.baddebt{ color: var(--text3); }
.inv-hero-status { margin-top: 12px; }
.inv-hero-actions { display: flex; gap: 10px; margin-top: 16px; }
.hero-btn {
  flex: 1; padding: 14px; border-radius: 12px; border: none; font-family: var(--sans);
  font-size: 16px; font-weight: 600; cursor: pointer;
}
.hero-btn:active { opacity: 0.8; }
.hero-btn-green { background: var(--green); color: #fff; }
.hero-btn-ghost { background: var(--surface3); color: var(--text2); }
.hero-btn-red { background: var(--red); color: #fff; }

/* ── LINE ITEMS ── */
.line-item { padding: 12px 16px; border-bottom: 0.5px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.line-item:last-child { border-bottom: none; }
.line-date { font-size: 14px; color: var(--text3); font-family: var(--mono); }
.line-desc { font-size: 14px; color: var(--text2); max-width: 60%; }
.line-amount { font-family: var(--mono); font-size: 15px; font-weight: 700; }
.line-amount.zero { color: var(--text3); }

/* ── EMPTY ── */
.empty-state { text-align: center; padding: 60px 32px; color: var(--text3); }
.empty-icon { font-size: 52px; margin-bottom: 16px; }
.empty-title { font-size: 20px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }
.empty-sub { font-size: 15px; }

/* ── SAVE BUTTON ── */
.save-bar {
  padding: 16px; padding-bottom: calc(var(--safe-bot) + 16px);
  background: var(--bg); border-top: 0.5px solid var(--border);
  flex-shrink: 0;
}
.save-btn {
  width: 100%; padding: 16px; background: var(--accent); border: none; border-radius: 14px;
  color: #fff; font-family: var(--sans); font-size: 17px; font-weight: 600; cursor: pointer;
}
.save-btn:active { opacity: 0.85; }
.save-btn:disabled { opacity: 0.4; }

/* ── ADHOC LINES ── */
.adhoc-row {
  display: flex; gap: 10px; padding: 12px 16px; border-bottom: 0.5px solid var(--border);
  align-items: center;
}
.adhoc-row:last-child { border-bottom: none; }
.adhoc-delete {
  background: var(--red); color: #fff; border: none; border-radius: 8px;
  width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
  font-size: 18px; cursor: pointer; flex-shrink: 0;
}
.adhoc-date-inp {
  background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px;
  padding: 8px 10px; font-family: var(--sans); font-size: 14px; color: var(--text); outline: none; width: 130px;
}
.adhoc-type-sel {
  flex: 1; background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px;
  padding: 8px 10px; font-family: var(--sans); font-size: 14px; color: var(--text);
  outline: none; -webkit-appearance: none;
}
.adhoc-amount-inp {
  background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px;
  padding: 8px 10px; font-family: var(--mono); font-size: 15px; font-weight: 700;
  color: var(--green2); outline: none; width: 90px; text-align: right;
}

/* ── SETTINGS ── */
.settings-row {
  display: flex; flex-direction: column; gap: 6px; padding: 14px 16px;
  border-bottom: 0.5px solid var(--border);
}
.settings-row:last-child { border-bottom: none; }
.settings-row label {
  font-size: 12px; color: var(--text3); font-family: var(--mono);

}
.settings-row input, .settings-row textarea {

/* ── TOAST ── */

@keyframes spin { to { transform: rotate(360deg); } }
</style>

<script>
// ═══════════════════════════════════════════
// DATA LAYER
// ═══════════════════════════════════════════
const DB = {
  save(k, v) { try { localStorage.setItem('tnbm_' + k, JSON.stringify(v)); } catch(e) {} },
  load(k, d) { try { const v = localStorage.getItem('tnbm_' + k); return v ? JSON.parse(v) : d; } catch(e) { return d; } }
};

let SHEETS_URL = DB.load('sheets_url', '');

const DEFAULT_CLIENTS = [
  { id: 'LSAir',     name: 'LS Airmotive Ltd',             rate: 200, tripRate: 500 },
  { id: 'PltFltTrn', name: 'Pilot Flight Training',        rate: 250, tripRate: 500 },
  { id: 'StfBar',    name: 'Stefan Barden',                rate: 250, tripRate: 500 },
  { id: 'Propl',     name: 'Propel Flight Operations',     rate: 250, tripRate: 500 },
  { id: 'OliviaW',   name: 'Zinck Aviation (O.Wilkinson)', rate: 250, tripRate: 500 },
  { id: 'Cwlkr',     name: 'Charlie R Walker Ltd',         rate: 250, tripRate: 500 },
  { id: 'Lvgstn',    name: 'Livingstone Skies Ltd',        rate: 250, tripRate: 500 },
  { id: 'MidAng',    name: 'Mid Anglia School of Flying',  rate: 250, tripRate: 500 },
  { id: 'Afield',    name: 'Andrewsfield Aviation',        rate: 250, tripRate: 500 },
  { id: 'Sbswilk',   name: 'SBS Wilkinson',                rate: 250, tripRate: 500 },
];

let state = {
  invoices: DB.load('invoices', []),
  clients:  DB.load('clients', DEFAULT_CLIENTS),
  settings: DB.load('settings', {}),
  nextInvoiceNum: DB.load('nextInvoiceNum', 246),
};

const DEFAULT_HASH = 'd8c69e263c811509ff4a34f0d4726c5fdeace40d123d8eca0baee47035b883d5';

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// ═══════════════════════════════════════════
// SYNC
// ═══════════════════════════════════════════
function setSyncUI(status) {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  const map = {
    syncing: ['amber', 'Syncing…'],
    synced:  ['green',  'Synced'],
    offline: ['amber',  'Offline'],
    error:   ['red',    'Error'],
    local:   ['',       'Local'],
  };
  const [cls, text] = map[status] || map.local;
  dot.className = 'sync-dot' + (cls ? ' ' + cls : '');
  lbl.textContent = text;
}

async function pushToSheets(silent = false) {
  const url = SHEETS_URL || DB.load('sheets_url', '');
  if (!url) { setSyncUI('local'); return; }
  setSyncUI('syncing');
  try {
    const payload = {
      invoices: state.invoices,
      clients:  state.clients,
      settings: state.settings,
      nextInvoiceNum: state.nextInvoiceNum,
      updatedAt: new Date().toISOString(),
    };
    await fetch(url, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(payload) });
    setSyncUI('synced');
  } catch(e) {
    setSyncUI('synced'); // Apps Script CORS — data likely went through
  }
}

async function loadFromSheets() {
  const url = SHEETS_URL || DB.load('sheets_url', '');
  if (!url) { setSyncUI('local'); return false; }
  setSyncUI('syncing');
  try {
    const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({ action: 'load' }) });
    if (!res.ok) throw new Error('failed');
    const result = await res.json();
    if (result.status === 'ok' && result.data) {
      if (result.data.invoices)       state.invoices       = result.data.invoices;
      if (result.data.clients)        state.clients        = result.data.clients;
      if (result.data.settings)       state.settings       = result.data.settings;
      if (result.data.nextInvoiceNum) state.nextInvoiceNum = result.data.nextInvoiceNum;
      DB.save('invoices', state.invoices);
      DB.save('clients',  state.clients);
      DB.save('settings', state.settings);
      DB.save('nextInvoiceNum', state.nextInvoiceNum);
      setSyncUI('synced');
      return true;
    }
    setSyncUI('local'); return false;
  } catch(e) {
    setSyncUI('offline'); return false;
  }
}

let syncTimer = null;
function debouncedSync() {
  clearTimeout(syncTimer);
  syncTimer = setTimeout(() => pushToSheets(true), 2000);
}

// ═══════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════
document.getElementById('pin-input').addEventListener('keydown', e => { if (e.key === 'Enter') attemptLogin(); });

async function attemptLogin() {
  const pin = document.getElementById('pin-input').value;
  if (!pin) return;
  const hash = await sha256(pin);
  const stored = DB.load('pwdhash', DEFAULT_HASH);
  if (hash === stored) {
    document.getElementById('screen-login').classList.remove('active');
    document.getElementById('screen-app').classList.add('active');
    SHEETS_URL = DB.load('sheets_url', '');
    const loaded = await loadFromSheets();
    if (!loaded) setSyncUI('local');
    initApp();
  } else {
    document.getElementById('login-err').textContent = 'Incorrect password.';
    document.getElementById('pin-input').value = '';
  }
}

function lockApp() {
  document.getElementById('screen-app').classList.remove('active');
  document.getElementById('screen-login').classList.add('active');
  document.getElementById('pin-input').value = '';
  document.getElementById('login-err').textContent = '';
}

// ═══════════════════════════════════════════
// APP INIT
// ═══════════════════════════════════════════
function initApp() {
  populateClientSelect();
  renderDashboard();
  renderInvoiceList();
  loadSettingsUI();
  updateUnpaidBadge();
}

function today() {
  return new Date().toISOString().split('T')[0];
}

function fmt(n) {
  return '£' + parseFloat(n || 0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

function fmtDate(s) {
  if (!s) return '—';
  const d = new Date(s + 'T12:00:00');
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ═══════════════════════════════════════════
// TAB NAVIGATION
// ═══════════════════════════════════════════
let currentTab = 'dashboard';
const tabViewMap = { dashboard: 'view-dashboard', invoices: 'view-invoices', create: 'view-create', settings: 'view-settings' };
const tabBtnMap  = { dashboard: 'tab-dash', invoices: 'tab-invs', create: 'tab-create', settings: 'tab-settings' };

function switchTab(tab) {
  currentTab = tab;
  Object.keys(tabViewMap).forEach(k => {
    document.getElementById(tabViewMap[k]).classList.toggle('active', k === tab);
    document.getElementById(tabBtnMap[k]).classList.toggle('active', k === tab);
  });
  document.getElementById('save-bar').style.display = tab === 'create' ? 'block' : 'none';
  if (tab === 'create') resetCreateForm();
  if (tab === 'dashboard') renderDashboard();
  if (tab === 'invoices') renderInvoiceList();
  // scroll to top
  document.getElementById('app-content').scrollTo({ top: 0 });
}

// ═══════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════
function renderDashboard() {
  const invoices = state.invoices;
  const unpaid = invoices.filter(i => i.status === 'unpaid' || i.status === 'partial');
  const unpaidTotal = unpaid.reduce((s, i) => s + i.total, 0);
  const paidThisMonth = (() => {
    const mo = today().slice(0, 7);
    return invoices.filter(i => i.status === 'paid' && (i.datePaid || '').startsWith(mo))
                   .reduce((s, i) => s + i.total, 0);
  })();
  const overdue = unpaid.filter(i => i.due && i.due < today());

  let html = '';

  // Unpaid total hero
  html += `<div class="summary-card" style="margin-top:16px">
    <div class="summary-card-label">Unpaid Total</div>
    <div class="summary-card-amount ${unpaidTotal > 0 ? 'red' : 'green'}">${fmt(unpaidTotal)}</div>
    <div class="summary-card-sub">${unpaid.length} invoice${unpaid.length !== 1 ? 's' : ''} outstanding</div>
  </div>`;

  // Mini cards
  html += `<div class="summary-grid">
    <div class="summary-mini">
      <div class="summary-mini-label">Paid This Month</div>
      <div class="summary-mini-value" style="color:var(--green2)">${fmt(paidThisMonth)}</div>
    </div>
    <div class="summary-mini">
      <div class="summary-mini-label">Overdue</div>
      <div class="summary-mini-value" style="color:${overdue.length > 0 ? 'var(--red2)' : 'var(--text3)'}">${overdue.length}</div>
    </div>
  </div>`;

  // Recent unpaid
  if (unpaid.length > 0) {
    html += `<div class="list-section">
      <div class="list-section-header">Awaiting Payment</div>
      <div class="list-group">`;
    unpaid.slice(0, 8).forEach(inv => {
      const overdueMark = inv.due && inv.due < today() ? ' ⚠' : '';
      html += `<div class="list-row" onclick="openInvSheet('${inv.id}')">
        <div class="list-row-body">
          <div class="list-row-title">${inv.clientName}</div>
          <div class="list-row-sub">#${inv.number} · Due ${inv.due ? fmtDate(inv.due) : 'on receipt'}${overdueMark}</div>
        </div>
        <div class="list-row-right">
          <div class="list-row-value" style="color:var(--red2)">${fmt(inv.total)}</div>
          <div class="list-row-chevron">›</div>
        </div>
      </div>`;
    });
    html += `</div></div>`;
  }

  // Recent paid
  const recentPaid = [...invoices].filter(i => i.status === 'paid').sort((a,b) => (b.datePaid||'') > (a.datePaid||'') ? 1 : -1).slice(0, 5);
  if (recentPaid.length > 0) {
    html += `<div class="list-section">
      <div class="list-section-header">Recently Paid</div>
      <div class="list-group">`;
    recentPaid.forEach(inv => {
      html += `<div class="list-row" onclick="openInvSheet('${inv.id}')">
        <div class="list-row-body">
          <div class="list-row-title">${inv.clientName}</div>
          <div class="list-row-sub">#${inv.number} · Paid ${fmtDate(inv.datePaid)}</div>
        </div>
        <div class="list-row-right">
          <div class="list-row-value" style="color:var(--green2)">${fmt(inv.total)}</div>
          <div class="list-row-chevron">›</div>
        </div>
      </div>`;
    });
    html += `</div></div>`;
  }

  if (invoices.length === 0) {
    html += `<div class="empty-state">
      <div class="empty-icon">◻</div>
      <div class="empty-title">No invoices yet</div>
      <div class="empty-sub">Tap + New to create your first invoice</div>
    </div>`;
  }

  html += '<div style="height:8px"></div>';
  document.getElementById('dash-content').innerHTML = html;
}

// ═══════════════════════════════════════════
// INVOICE LIST
// ═══════════════════════════════════════════
function updateUnpaidBadge() {
  const n = state.invoices.filter(i => i.status === 'unpaid' || i.status === 'partial').length;
  const el = document.getElementById('unpaid-badge');
  el.dataset.count = n > 0 ? n : 0;
}

function renderInvoiceList() {
  const sorted = [...state.invoices].sort((a, b) => b.number - a.number);
  let html = '';

  if (sorted.length === 0) {
    document.getElementById('inv-list-content').innerHTML = `<div class="empty-state" style="margin-top:60px">
      <div class="empty-icon">◻</div>
      <div class="empty-title">No invoices</div>
      <div class="empty-sub">Create one using the + New tab</div>
    </div>`;
    return;
  }

  // Group by status
  const groups = {
    'Unpaid': sorted.filter(i => i.status === 'unpaid'),
    'Partial': sorted.filter(i => i.status === 'partial'),
    'Paid': sorted.filter(i => i.status === 'paid'),
    'Bad Debt': sorted.filter(i => i.status === 'baddebt'),
  };

  Object.entries(groups).forEach(([label, invs]) => {
    if (!invs.length) return;
    html += `<div class="list-section">
      <div class="list-section-header">${label} (${invs.length})</div>
      <div class="list-group">`;
    invs.forEach(inv => {
      const pillCls = { unpaid: 'pill-unpaid', paid: 'pill-paid', partial: 'pill-partial', baddebt: 'pill-baddebt' }[inv.status] || 'pill-unpaid';
      html += `<div class="list-row" onclick="openInvSheet('${inv.id}')">
        <div class="list-row-body">
          <div class="list-row-title">${inv.clientName}</div>
          <div class="list-row-sub">#${inv.number} · ${fmtDate(inv.date)} · ${inv.lines ? inv.lines.filter(l=>l.amount>0).length + 'd' : ''}</div>
        </div>
        <div class="list-row-right" style="flex-direction:column;align-items:flex-end;gap:4px">
          <div class="list-row-value">${fmt(inv.total)}</div>
          <span class="status-pill ${pillCls}">${inv.status === 'baddebt' ? 'bad debt' : inv.status}</span>
        </div>
      </div>`;
    });
    html += `</div></div>`;
  });

  html += '<div style="height:8px"></div>';
  document.getElementById('inv-list-content').innerHTML = html;
}

// INVOICE DETAIL SHEET

let currentInvId = null;

function openInvSheet(id) {
  currentInvId = id;
  renderInvSheet();
  document.getElementById('inv-sheet').classList.add('open');
}

function closeInvSheet() {
  document.getElementById('inv-sheet').classList.remove('open');
  currentInvId = null;
}

function renderInvSheet() {
  const inv = state.invoices.find(i => i.id === currentInvId);
  if (!inv) return;
  document.getElementById('inv-sheet-title').textContent = `Invoice #${inv.number}`;

  const statusLabels = { unpaid: 'Unpaid', paid: 'Paid', partial: 'Partial', baddebt: 'Bad Debt' };
  const pillCls = { unpaid: 'pill-unpaid', paid: 'pill-paid', partial: 'pill-partial', baddebt: 'pill-baddebt' }[inv.status] || 'pill-unpaid';

  // Action buttons based on status
  let actionBtns = '';
  if (inv.status === 'unpaid' || inv.status === 'partial') {
    actionBtns += `<button class="hero-btn hero-btn-green" onclick="markPaid('${inv.id}')">✓ Mark Paid</button>`;
  }
  if (inv.status === 'unpaid') {
    actionBtns += `<button class="hero-btn hero-btn-ghost" onclick="markBadDebt('${inv.id}')">Bad Debt</button>`;
  }
  if (inv.status === 'paid' || inv.status === 'baddebt') {
    actionBtns += `<button class="hero-btn hero-btn-ghost" onclick="markUnpaid('${inv.id}')">↩ Reinstate</button>`;
  }

  let linesHtml = (inv.lines || []).map(l => {
    if (l.amount === 0 && !l.desc) return '';
    return `<div class="line-item">
      <div>
        <div class="line-date">${l.date ? fmtDate(l.date) : ''}</div>
        ${l.desc ? `<div class="line-desc">${l.desc}</div>` : ''}
      </div>
      <div class="line-amount ${l.amount === 0 ? 'zero' : ''}">£${parseFloat(l.amount||0).toFixed(2)}</div>
    </div>`;
  }).join('');

  let html = `
    <div class="inv-hero">
      <div class="inv-hero-client">${inv.clientName}</div>
      <div class="inv-hero-num">#${inv.number} · ${fmtDate(inv.date)}</div>
      <div class="inv-hero-amount ${inv.status}">${fmt(inv.total)}</div>
      <div class="inv-hero-status"><span class="status-pill ${pillCls}">${statusLabels[inv.status] || inv.status}</span></div>
      ${actionBtns ? `<div class="inv-hero-actions">${actionBtns}</div>` : ''}
    </div>

    <div class="list-section">
      <div class="list-section-header">Details</div>
      <div class="list-group">
        <div class="list-row" style="cursor:default">
          <div class="list-row-body"><div class="list-row-sub">Due</div></div>
          <div style="font-family:var(--mono);font-size:14px;color:var(--text2)">${inv.due ? fmtDate(inv.due) : 'On receipt'}</div>
        </div>
        ${inv.datePaid ? `<div class="list-row" style="cursor:default">
          <div class="list-row-body"><div class="list-row-sub">Paid</div></div>
          <div style="font-family:var(--mono);font-size:14px;color:var(--green2)">${fmtDate(inv.datePaid)}</div>
        </div>` : ''}
      </div>
    </div>

    <div class="list-section">
      <div class="list-section-header">Lines (${(inv.lines||[]).filter(l=>l.amount>0).length} charged)</div>
      <div class="list-group">${linesHtml || '<div class="line-item"><div class="line-desc">No lines</div></div>'}</div>
    </div>

    ${inv.notes ? `<div class="list-section">
      <div class="list-section-header">Notes</div>
      <div class="list-group">
        <div style="padding:14px 16px;font-size:15px;color:var(--text2);font-style:italic">${inv.notes}</div>
      </div>
    </div>` : ''}

    <div style="margin:16px">
      <button class="qa-btn" style="width:100%;text-align:center;padding:14px;border-radius:12px;color:var(--red);border-color:var(--red)" onclick="deleteInvoice('${inv.id}')">Delete Invoice</button>
    </div>
    <div style="height:8px"></div>
  `;

  document.getElementById('inv-sheet-body').innerHTML = html;
}

function markPaid(id) {
  const inv = state.invoices.find(i => i.id === id);
  if (!inv) return;
  inv.status = 'paid'; inv.datePaid = today();
  saveState();
  renderInvSheet();
  updateUnpaidBadge();
  renderDashboard();
  renderInvoiceList();
  showToast('✓ Marked as paid');
}

function markBadDebt(id) {
  const inv = state.invoices.find(i => i.id === id);
  if (!inv) return;
  if (!confirm(`Mark #${inv.number} as bad debt?`)) return;
  inv.status = 'baddebt'; inv.datePaid = null;
  saveState();
  renderInvSheet();
  updateUnpaidBadge();
  renderDashboard();
  renderInvoiceList();
  showToast('Marked as bad debt');
}

function markUnpaid(id) {
  const inv = state.invoices.find(i => i.id === id);
  if (!inv) return;
  inv.status = 'unpaid'; inv.datePaid = null;
  saveState();
  renderInvSheet();
  updateUnpaidBadge();
  renderDashboard();
  renderInvoiceList();
  showToast('Reinstated as unpaid');
}

function deleteInvoice(id) {
  if (!confirm('Delete this invoice? Cannot be undone.')) return;
  state.invoices = state.invoices.filter(i => i.id !== id);
  saveState();
  closeInvSheet();
  updateUnpaidBadge();
  renderDashboard();
  renderInvoiceList();
  showToast('Invoice deleted');
}

// ═══════════════════════════════════════════
// CREATE INVOICE
// ═══════════════════════════════════════════
let createType = 'monthly';
let calYear, calMonth; // 1-based month
let calData = {};      // date string → { amount, note }
let calRate = 200;
let weekendsOn = false;
let currentSheetDate = null;

const ADDONS = [
  { id: 'night',    label: 'Night Flying',    default: 100 },
  { id: 'exam',     label: 'Exam / Test Fee', default: 175 },
  { id: 'imc',      label: 'IMC / Renewal',   default: 150 },
  { id: 'ground',   label: 'Ground School',   default: 200 },
  { id: 'custom',   label: 'Custom Extra',    default: 0   },
];
let addonState = {}; // id → { active, amount }

function populateClientSelect() {
  const sel = document.getElementById('c-client');
  sel.innerHTML = '<option value="">Select client…</option>';
  (state.clients || DEFAULT_CLIENTS).forEach(c => {
    const o = document.createElement('option');
    o.value = c.id; o.textContent = c.name;
    sel.appendChild(o);
  });
}

function onClientChange() {
  const id = document.getElementById('c-client').value;
  const client = (state.clients || DEFAULT_CLIENTS).find(c => c.id === id);
  if (client) {
    calRate = client.rate || 200;
    document.getElementById('qa-rate-label').textContent = calRate;
    document.querySelector('#sq-full').textContent = `£${calRate}`;
    document.querySelector('#sq-half').textContent = `£${Math.round(calRate/2)}`;
  }
  // rebuild calendar with new rate if in monthly mode — only untouched days
  if (createType === 'monthly') renderCalendar();
}

function setCreateType(type) {
  createType = type;
  document.getElementById('type-monthly-btn').classList.toggle('active', type === 'monthly');
  document.getElementById('type-adhoc-btn').classList.toggle('active', type === 'adhoc');
  document.getElementById('create-monthly').style.display = type === 'monthly' ? '' : 'none';
  document.getElementById('create-adhoc').style.display = type === 'adhoc' ? '' : 'none';
}

function resetCreateForm() {
  // Set defaults
  document.getElementById('c-client').value = '';
  document.getElementById('c-number').value = state.nextInvoiceNum;
  document.getElementById('c-date').value = today();
  // Due = today + 7
  const due = new Date(); due.setDate(due.getDate() + 7);
  document.getElementById('c-due').value = due.toISOString().split('T')[0];
  document.getElementById('c-notes').value = '';

  // Calendar: current month
  const now = new Date();
  calYear = now.getFullYear();
  calMonth = now.getMonth() + 1;
  calData = {};
  calRate = 200;
  weekendsOn = false;
  addonState = {};

  // Auto-fill all weekdays with calRate
  prefillWeekdays();
  renderCalendar();
  renderAddons();
  updateCalTotal();

  // Adhoc
  document.getElementById('adhoc-lines-wrap').innerHTML = '';

  createType = 'monthly';
  setCreateType('monthly');

  // Quick action labels
  document.getElementById('qa-rate-label').textContent = calRate;
  document.querySelector('#sq-full').textContent = `£${calRate}`;
  document.querySelector('#sq-half').textContent = `£${Math.round(calRate/2)}`;
}

function prefillWeekdays() {
  const days = daysInMonth(calYear, calMonth);
  for (let d = 1; d <= days; d++) {
    const date = new Date(calYear, calMonth - 1, d);
    const dow = date.getDay();
    if (dow === 0 || dow === 6) continue;
    const ds = dateStr(calYear, calMonth, d);
    if (!calData[ds]) calData[ds] = { amount: calRate, note: '' };
  }
}

function daysInMonth(y, m) { return new Date(y, m, 0).getDate(); }

function dateStr(y, m, d) {
  return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function calNavigate(dir) {
  // save current calData
  calMonth += dir;
  if (calMonth > 12) { calMonth = 1; calYear++; }
  if (calMonth < 1)  { calMonth = 12; calYear--; }
  // fresh calData for new month
  calData = {};
  weekendsOn = false;
  prefillWeekdays();
  // Update invoice date
  const lastDay = new Date(calYear, calMonth, 0);
  document.getElementById('c-date').value = lastDay.toISOString().split('T')[0];
  const dueDate = new Date(calYear, calMonth, 7);
  document.getElementById('c-due').value = dueDate.toISOString().split('T')[0];
  renderCalendar();
  updateCalTotal();
}

function renderCalendar() {
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('cal-month-label').textContent = `${monthNames[calMonth-1]} ${calYear}`;

  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  // Day name headers
  ['Mo','Tu','We','Th','Fr','Sa','Su'].forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-day-name';
    el.textContent = d;
    grid.appendChild(el);
  });

  const days = daysInMonth(calYear, calMonth);
  const firstDate = new Date(calYear, calMonth - 1, 1);
  let firstDow = firstDate.getDay(); // 0=Sun
  // convert to Mon=0 offset
  const offset = firstDow === 0 ? 6 : firstDow - 1;

  // Empty cells
  for (let i = 0; i < offset; i++) {
    const el = document.createElement('button');
    el.className = 'cal-cell empty'; el.disabled = true;
    grid.appendChild(el);
  }

  const todayStr = today();

  for (let d = 1; d <= days; d++) {
    const ds = dateStr(calYear, calMonth, d);
    const date = new Date(calYear, calMonth - 1, d);
    const dow = date.getDay();
    const isWeekend = dow === 0 || dow === 6;
    const data = calData[ds];
    const amt = data ? data.amount : 0;
    const excluded = isWeekend ? !weekendsOn : (data && data.excluded);
    const hasValue = amt > 0 && !excluded;

    const el = document.createElement('button');
    el.className = 'cal-cell' + (isWeekend ? ' weekend' : '') + (excluded ? ' excluded' : '') + (hasValue ? ' has-value' : '') + (ds === todayStr ? ' today' : '');

    const num = document.createElement('div');
    num.className = 'cal-num'; num.textContent = d;
    el.appendChild(num);

    if (hasValue) {
      const rate = document.createElement('div');
      rate.className = 'cal-rate';
      rate.textContent = `£${amt}`;
      el.appendChild(rate);
    }

    if (!excluded) {
      el.onclick = () => openDaySheet(ds, d, dow);
    } else if (isWeekend) {
      el.onclick = () => {}; // no-op
    } else {
      // excluded weekday — tap to restore
      el.onclick = () => {
        if (calData[ds]) calData[ds].excluded = false;
        renderCalendar(); updateCalTotal();
      };
    }
    grid.appendChild(el);
  }
}

function calSetAll(val) {
  const days = daysInMonth(calYear, calMonth);
  for (let d = 1; d <= days; d++) {
    const date = new Date(calYear, calMonth - 1, d);
    const dow = date.getDay();
    if (dow === 0 || dow === 6) continue;
    const ds = dateStr(calYear, calMonth, d);
    calData[ds] = { amount: val, note: calData[ds]?.note || '', excluded: false };
  }
  renderCalendar(); updateCalTotal();
}

function calToggleWeekends() {
  weekendsOn = !weekendsOn;
  document.getElementById('qa-weekends').textContent = weekendsOn ? '− Weekends' : '+ Weekends';
  if (weekendsOn) {
    // fill weekends with 0
    const days = daysInMonth(calYear, calMonth);
    for (let d = 1; d <= days; d++) {
      const date = new Date(calYear, calMonth - 1, d);
      const dow = date.getDay();
      if (dow !== 0 && dow !== 6) continue;
      const ds = dateStr(calYear, calMonth, d);
      if (!calData[ds]) calData[ds] = { amount: 0, note: '' };
    }
  }
  renderCalendar(); updateCalTotal();
}

function updateCalTotal() {
  let total = 0;
  Object.entries(calData).forEach(([ds, d]) => {
    if (!d.excluded) total += d.amount || 0;
  });
  // Add add-ons
  Object.entries(addonState).forEach(([id, a]) => {
    if (a.active) total += a.amount || 0;
  });
  document.getElementById('cal-total').textContent = fmt(total);
}

// ═══ DAY SHEET ═══
function openDaySheet(ds, day, dow) {
  currentSheetDate = ds;
  const date = new Date(calYear, calMonth - 1, day);
  const dayName = date.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'short' });
  document.getElementById('sheet-day-title').textContent = dayName;

  const data = calData[ds] || { amount: calRate, note: '' };
  document.getElementById('sheet-amount').value = data.amount || '';
  document.getElementById('sheet-note').value = data.note || '';
  document.querySelector('#sq-full').textContent = `£${calRate}`;
  document.querySelector('#sq-half').textContent = `£${Math.round(calRate/2)}`;

  document.getElementById('sheet-overlay').classList.add('open');
  document.getElementById('day-sheet').classList.add('open');
  setTimeout(() => document.getElementById('sheet-amount').focus(), 350);
}

function closeSheet() {
  if (currentSheetDate) {
    const amount = parseFloat(document.getElementById('sheet-amount').value) || 0;
    const note = document.getElementById('sheet-note').value;
    calData[currentSheetDate] = { amount, note, excluded: amount === 0 ? true : false };
    if (amount > 0) calData[currentSheetDate].excluded = false;
    currentSheetDate = null;
  }
  document.getElementById('sheet-overlay').classList.remove('open');
  document.getElementById('day-sheet').classList.remove('open');
  renderCalendar();
  updateCalTotal();
}

function sheetQuick(type) {
  const val = type === 'full' ? calRate : type === 'half' ? Math.round(calRate/2) : 0;
  document.getElementById('sheet-amount').value = val || '';
  updateSheetTotal();
}

function updateSheetTotal() { /* live preview if needed */ }

// ═══ ADD-ONS ═══
function renderAddons() {
  const grid = document.getElementById('addons-grid');
  grid.innerHTML = '';
  ADDONS.forEach(a => {
    const s = addonState[a.id] || { active: false, amount: a.default };
    const pill = document.createElement('div');
    pill.className = 'addon-pill' + (s.active ? ' active' : '');
    pill.innerHTML = `<span class="addon-pill-label">${a.label}</span>
      <span class="addon-pill-amount">£${s.amount}</span>`;
    pill.onclick = () => toggleAddon(a.id, a.default);
    grid.appendChild(pill);
  });
}

function toggleAddon(id, defaultAmt) {
  const current = addonState[id] || { active: false, amount: defaultAmt };
  if (!current.active) {
    // prompt for amount
    const amt = parseFloat(prompt(`${ADDONS.find(a=>a.id===id).label} — amount?`, defaultAmt));
    if (isNaN(amt)) return;
    addonState[id] = { active: true, amount: amt };
  } else {
    addonState[id] = { ...current, active: false };
  }
  renderAddons();
  updateCalTotal();
}

// ═══ ADHOC LINES ═══
function getClientRates() {
  const id = document.getElementById('c-client').value;
  const c = (state.clients || DEFAULT_CLIENTS).find(c => c.id === id);
  return { day: c?.rate || 250, half: Math.round((c?.rate||250)/2), trip: c?.tripRate || 500 };
}

function addAdhocRow(date = '', type = 'day', desc = '', amount = '') {
  const rates = getClientRates();
  const wrap = document.getElementById('adhoc-lines-wrap');
  const row = document.createElement('div');
  row.className = 'adhoc-row';

  const delBtn = document.createElement('button');
  delBtn.className = 'adhoc-delete';
  delBtn.textContent = '−';
  delBtn.onclick = () => { row.remove(); };

  const dateInp = document.createElement('input');
  dateInp.className = 'adhoc-date-inp';
  dateInp.type = 'date'; dateInp.value = date || today();

  const typeSel = document.createElement('select');
  typeSel.className = 'adhoc-type-sel';
  typeSel.innerHTML = `
    <option value="day">Full day (£${rates.day})</option>
    <option value="half">Half day (£${rates.half})</option>
    <option value="trip">Trip (£${rates.trip})</option>
    <option value="fixed">Fixed amount</option>
  `;
  typeSel.value = type;

  const amtInp = document.createElement('input');
  amtInp.className = 'adhoc-amount-inp';
  amtInp.type = 'number'; amtInp.min = '0'; amtInp.step = '0.01';
  amtInp.value = amount !== '' ? amount : (type === 'day' ? rates.day : type === 'half' ? rates.half : type === 'trip' ? rates.trip : '');
  amtInp.placeholder = '0.00';

  typeSel.onchange = () => {
    const t = typeSel.value, r = getClientRates();
    if (t === 'day')  amtInp.value = r.day;
    if (t === 'half') amtInp.value = r.half;
    if (t === 'trip') amtInp.value = r.trip;
    if (t === 'fixed') { amtInp.value = ''; amtInp.focus(); }
  };

  row.appendChild(delBtn);
  row.appendChild(dateInp);
  row.appendChild(typeSel);
  row.appendChild(amtInp);
  wrap.appendChild(row);
}

// ═══ SAVE INVOICE ═══
function collectLines() {
  const lines = [];
  if (createType === 'monthly') {
    const days = daysInMonth(calYear, calMonth);
    for (let d = 1; d <= days; d++) {
      const ds = dateStr(calYear, calMonth, d);
      const data = calData[ds];
      if (!data) continue;
      const date = new Date(calYear, calMonth - 1, d);
      const dow = date.getDay();
      const isWeekend = dow === 0 || dow === 6;
      if (isWeekend && !weekendsOn) continue;
      if (data.excluded) {
        lines.push({ date: ds, desc: data.note || '', notes: '', amount: 0 });
      } else {
        lines.push({ date: ds, desc: data.note || '', notes: '', amount: data.amount || 0 });
      }
    }
    // Add-ons as separate lines
    ADDONS.forEach(a => {
      const s = addonState[a.id];
      if (s && s.active) {
        lines.push({ date: dateStr(calYear, calMonth, daysInMonth(calYear, calMonth)), desc: a.label, notes: '', amount: s.amount });
      }
    });
  } else {
    document.querySelectorAll('#adhoc-lines-wrap .adhoc-row').forEach(row => {
      const dateInp = row.querySelector('.adhoc-date-inp');
      const typeSel = row.querySelector('.adhoc-type-sel');
      const amtInp = row.querySelector('.adhoc-amount-inp');
      lines.push({
        date: dateInp?.value || '',
        desc: typeSel?.options[typeSel?.selectedIndex]?.text || '',
        notes: '',
        amount: parseFloat(amtInp?.value) || 0,
        lineType: typeSel?.value || 'fixed',
      });
    });
  }
  return lines;
}

function saveInvoice() {
  const clientId = document.getElementById('c-client').value;
  if (!clientId) { showToast('⚠ Select a client first'); return; }
  const client = (state.clients || DEFAULT_CLIENTS).find(c => c.id === clientId);
  const lines = collectLines();
  const total = lines.reduce((s, l) => s + (l.amount || 0), 0);
  if (total === 0) { showToast('⚠ Invoice total is £0'); return; }

  const inv = {
    id: Date.now().toString(),
    number: parseInt(document.getElementById('c-number').value) || state.nextInvoiceNum,
    date: document.getElementById('c-date').value,
    due: document.getElementById('c-due').value,
    clientId,
    clientName: client ? client.name : clientId,
    to: client ? (client.address || client.name) : clientId,
    lines,
    total,
    notes: document.getElementById('c-notes').value,
    invType: createType,
    status: 'unpaid',
    datePaid: null,
  };

  state.invoices.push(inv);
  state.nextInvoiceNum = Math.max(state.nextInvoiceNum, inv.number + 1);
  saveState();
  updateUnpaidBadge();
  renderDashboard();
  renderInvoiceList();
  showToast(`✓ Invoice #${inv.number} saved — ${fmt(total)}`);
  // Switch to invoices tab and open the new invoice
  switchTab('invoices');
  setTimeout(() => openInvSheet(inv.id), 400);
}

// ═══════════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════════
function loadSettingsUI() {
  const url = DB.load('sheets_url', '');
  document.getElementById('s-sheets-url').value = url || '';
}

function saveSettings() {
  const url = document.getElementById('s-sheets-url').value.trim();
  SHEETS_URL = url;
  DB.save('sheets_url', url);
  pushToSheets();
  showToast('✓ Settings saved');
}

// ═══════════════════════════════════════════
// PERSIST
// ═══════════════════════════════════════════
function saveState() {
  DB.save('invoices', state.invoices);
  DB.save('clients',  state.clients);
  DB.save('settings', state.settings);
  DB.save('nextInvoiceNum', state.nextInvoiceNum);
  debouncedSync();
}
</script>
